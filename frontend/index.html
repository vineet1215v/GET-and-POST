<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET and POST Requests</title>
</head>
<body>
    <h3>GET Request Form</h3>
    <form method="get" action="http://localhost:8000/register">
        <input type="text" placeholder="enter username" name="user">
        <input type="password" placeholder="enter password" name="password">
        <button>Submit</button>
    </form>

    <h3>GET POST Form</h3>
    <form method="post" action="http://localhost:8000/register">
        <input type="text" placeholder="enter username" name="user">
        <input type="password" placeholder="enter password" name="password">
        <button>Submit</button>
    </form>
</body>
</html>
